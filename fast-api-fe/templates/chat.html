<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <meta name="description" content="Customer Booking Assistant — AI-powered chat to look up customers and manage bookings." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">BookingAgent</span>
      </div>
      <button class="btn-new-chat" id="btn-new-chat" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New chat
      </button>
    </div>
    <nav class="sidebar-nav">
      <p class="nav-label">Suggestions</p>
      <button class="suggestion-chip" data-prompt="Show me all customers">📋 All customers</button>
      <button class="suggestion-chip" data-prompt="Look up customer Alice">🔍 Look up Alice</button>
      <button class="suggestion-chip" data-prompt="Make a hotel booking for Bob">🏨 Book for Bob</button>
      <button class="suggestion-chip" data-prompt="What can you help me with?">💬 What can you do?</button>
    </nav>
  </aside>

  <!-- Main chat area -->
  <main class="main">
    <header class="topbar">
      <button class="btn-icon btn-sidebar-toggle" id="btn-sidebar-toggle" title="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title">{{ title }}</span>
      <span class="topbar-badge">Powered by Vertex AI</span>
    </header>

    <!-- Messages feed -->
    <div class="messages-container" id="messages-container">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon">✦</div>
        <h1 class="welcome-title">How can I help you today?</h1>
        <p class="welcome-subtitle">I can look up customer details and manage hotel bookings.</p>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Ask me about customers or bookings…"
          rows="1"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <button class="btn-send" id="btn-send" disabled title="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Responses come from the Customer Booking Agent Engine on Vertex AI.</p>
    </div>
  </main>

  <script src="/static/chat.js"></script>
</body>
</html>
